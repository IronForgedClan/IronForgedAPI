name: unit-test

on:
    workflow_call:

jobs:
    run-unit-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Generate App token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.SUBMODULE_APP_ID }}
                  private-key: ${{ secrets.SUBMODULE_APP_PRIVATE_KEY }}
                  repositories: |
                      IronForgedApi
                      IronForgedBot_Data

            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  submodules: recursive

            - name: Debug submodule state
              if: always()
              run: |
                  echo "=== git submodule status ==="
                  git submodule status || echo "(no submodules registered)"
                  echo "=== ls -la data/ ==="
                  ls -la data/ 2>&1 || echo "(data/ missing or not a directory)"
                  echo "=== files inside data/ ==="
                  find data -type f 2>&1 | head -20 || echo "(no files found)"
                  echo "=== .gitmodules ==="
                  cat .gitmodules
                  echo "=== .git/modules/data/config (URL git will use to refetch) ==="
                  cat .git/modules/data/config 2>&1 | head -20 || echo "(no submodule git config)"
                  echo "=== git config --get-regexp '^url\\.' ==="
                  git config --get-regexp '^url\.' || echo "(no url.* config)"

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"
                  architecture: "x64"

            - name: Display Python version
              run: python -c "import sys; print(sys.version)"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ./api[dev]

            - name: Run tests
              run: python run_tests.py
