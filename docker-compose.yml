services:
    db:
        image: mariadb:latest
        container_name: ironforged_db
        restart: unless-stopped
        environment:
            MARIADB_ROOT_PASSWORD: ${DB_ROOT}
            MARIADB_DATABASE: ${DB_NAME}
            MARIADB_USER: ${DB_USER}
            MARIADB_PASSWORD: ${DB_PASS}
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            start_period: 10s
            interval: 5s
            timeout: 3s
            retries: 5
        volumes:
            - mariadb_data:/var/lib/mysql
            - ./init-db:/docker-entrypoint-initdb.d:ro
        networks:
            - ironforged-network

    api:
        build:
            context: .
            target: api-dev
        image: ironforgedapi:dev
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        env_file: .env
        environment:
            DATABASE_URL: mysql+aiomysql://${DB_USER}:${DB_PASS}@db/${DB_NAME}
            API_HOST: 0.0.0.0
        ports:
            - "127.0.0.1:${API_PORT:-8080}:8080"
        volumes:
            - .:/app
            - ./data:/app/data:ro
            - ./logs:/app/logs
        networks:
            - ironforged-network

    api_prod:
        build:
            context: .
            target: api-prod
        image: ironforgedapi:prod
        restart: unless-stopped
        working_dir: /app
        command: ["python", "-m", "api.main"]
        depends_on:
            db:
                condition: service_healthy
        env_file: .env
        environment:
            DATABASE_URL: mysql+aiomysql://${DB_USER}:${DB_PASS}@db/${DB_NAME}
            API_HOST: 0.0.0.0
        ports:
            - "127.0.0.1:${API_PORT:-8080}:8080"
        volumes:
            - ./data:/app/data:ro
            - ./logs:/app/logs
        networks:
            - ironforged-network

volumes:
    mariadb_data:

networks:
    ironforged-network:
        name: ironforged-network
        driver: bridge
