# Dev only. The shared dev database lives in ../IronForgedBot/docker-compose.yml
# (this compose only defines the api service and joins the shared ironforged-network).

services:
    api:
        build:
            context: .
            target: api-dev
        image: ironforgedapi:dev
        restart: unless-stopped
        env_file: .env
        environment:
            DATABASE_URL: mysql+aiomysql://${DB_USER}:${DB_PASS}@db/${DB_NAME}
            API_HOST: 0.0.0.0
        ports:
            - "127.0.0.1:${API_PORT:-8080}:8080"
        volumes:
            - .:/app
            - ./data:/app/data:ro
            - ./logs:/app/logs
        networks:
            - ironforged-network

    api_prod:
        build:
            context: .
            target: api-prod
        image: ironforgedapi:prod
        restart: unless-stopped
        working_dir: /app
        command: ["python", "-m", "api.main"]
        env_file: .env
        environment:
            DATABASE_URL: mysql+aiomysql://${DB_USER}:${DB_PASS}@db/${DB_NAME}
            API_HOST: 0.0.0.0
        ports:
            - "127.0.0.1:${API_PORT:-8080}:8080"
        volumes:
            - ./data:/app/data:ro
            - ./logs:/app/logs
        networks:
            - ironforged-network

networks:
    ironforged-network:
        name: ironforged-network
        external: true
